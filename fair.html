<h3 class="mt-4">Fare Calculator</h3>

<div class="row mt-3">

    <div class="col-md-4">
        <label>Pick-up Station</label>
        <select class="form-select" id="pickup">
            <option value="">Select Station</option>
            <option value="0">North Ave</option>
            <option value="1">Quezon Ave</option>
            <option value="2">GMA Kamuning</option>
            <option value="3">Cubao</option>
        </select>
    </div>

    <div class="col-md-4">
        <label>Drop-off Station</label>
        <select class="form-select" id="dropoff">
            <option value="">Select Station</option>
            <option value="0">North Ave</option>
            <option value="1">Quezon Ave</option>
            <option value="2">GMA Kamuning</option>
            <option value="3">Cubao</option>
        </select>
    </div>

    <div class="col-md-4">
        <label>Fare</label>
        <input type="text" class="form-control" id="fareOutput" placeholder="0.00" readonly>
    </div>

</div>

    <button class="btn btn-primary" onclick="calculateFare()">Calculate Fare</button>
